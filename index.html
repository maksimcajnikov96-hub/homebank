<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Эксклюзивный Детский Банк</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f7; padding: 15px; color: #333; margin: 0; }
        h1 { text-align: center; color: #2c3e50; margin: 20px 0; font-size: 24px; }
        h3, h4 { margin-top: 0; color: #34495e; }
        .bank-card { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 420px; margin: 0 auto 20px auto; box-sizing: border-box; }
        button { background-color: #2ecc71; color: white; border: none; padding: 14px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; font-size: 16px; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        button:hover { background-color: #27ae60; }
        .btn-alt { background-color: #3498db; }
        .btn-alt:hover { background-color: #2980b9; }
        .btn-purple { background-color: #9b59b6; }
        .btn-purple:hover { background-color: #8e44ad; }
        .btn-danger { background-color: #e74c3c; }
        .btn-danger:hover { background-color: #c0392b; }
        .btn-link { background: none; color: #3498db; border: none; padding: 5px; width: auto; font-weight: normal; text-decoration: underline; margin-top: 15px; font-size: 14px; }
        input { padding: 12px; width: 100%; border-radius: 10px; border: 1px solid #ccc; margin-top: 8px; margin-bottom: 15px; font-size: 16px; box-sizing: border-box; }
        .account-number { font-family: monospace; background: #f8f9fa; padding: 6px 12px; border-radius: 6px; border: 1px dashed #3498db; color: #2980b9; font-size: 18px; display: inline-block; margin-top: 5px; margin-bottom: 12px; }
        .cvv-number { font-family: monospace; background: #f1c40f; padding: 4px 10px; border-radius: 6px; color: #fff; font-weight: bold; font-size: 16px; }
        .admin-badge { background-color: #9b59b6; color: white; padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: bold; margin-left: 8px; vertical-align: middle; }
        #qr-container { display: flex; justify-content: center; margin: 15px 0; background: #f8f9fa; padding: 10px; border-radius: 10px; }
        #reader { width: 100%; max-width: 350px; margin: 15px auto; border-radius: 10px; overflow: hidden; }
    </style>
</head>
<body>

    <h1>✨ HomeBank Premium ✨</h1>

    <div class="bank-card" id="login-zone">
        <h3>🔐 Войти в личный кабинет</h3>
        <label>Номер счета:</label>
        <input type="text" id="login-number" placeholder="XXXX XXXX">
        <label>CVV код:</label>
        <input type="password" id="login-cvv" placeholder="****" maxlength="4">
        <button class="btn-alt" onclick="loginAccount()">Войти в банк 🚪</button>
        <center><button class="btn-link" onclick="switchZone('register')">У меня еще нет счета (Регистрация)</button></center>
    </div>

    <div class="bank-card" id="register-zone" style="display: none;">
        <h3>🚀 Открытие нового счета</h3>
        <label>Ваш будущий номер счета:</label><br>
        <strong class="account-number" id="reg-generated-number">Генерируется...</strong>
        <br>
        <label>Имя владельца:</label>
        <input type="text" id="reg-name" placeholder="Например, Алиса">
        <label>Придумайте свой CVV код (3 цифры):</label>
        <input type="text" id="reg-custom-cvv" placeholder="Например, 777" maxlength="3">
        <button onclick="createAccount()">Зарегистрироваться</button>
        <center><button class="btn-link" onclick="switchZone('login')">Уже есть счет? Войти</button></center>
    </div>

    <div class="bank-card" id="account-zone" style="display: none;">
        <h2><span id="display-name">Владелец</span><span id="admin-tag" class="admin-badge" style="display: none;">БАНКИР</span></h2>
        <p>Номер счета: <strong class="account-number" id="display-number">0000 0000</strong></p>
        <p>Ваш секретный CVV: <span class="cvv-number" id="display-cvv">000</span></p>
        <p style="font-size: 28px; margin: 20px 0;">Баланс: <strong id="balance" style="color: #2ecc71;">0</strong> 🪙</p>
        
        <button class="btn-purple" onclick="toggleQRCodeZone()">Запросить перевод по QR-коду 📱</button>
        <div id="qr-block" style="display: none; text-align: center; margin-top: 15px;">
            <label>Какую сумму вы хотите получить?</label>
            <input type="number" id="qr-requested-amount" placeholder="Количество монет (например, 50)" min="1">
            <button class="btn-purple" onclick="generateQRWithAmount()">Сгенерировать QR-код ✨</button>
            <div id="qr-container-wrapper" style="display: none; margin-top: 15px;">
                <h4>Покажите этот код для оплаты:</h4>
                <div id="qr-container"></div>
            </div>
        </div>

        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
        
        <div id="admin-deposit-zone" style="display: none;">
            <h4>🎁 Выдать монеты за задание</h4>
            <input type="number" id="deposit-amount" placeholder="Количество монет" min="1">
            <button class="btn-alt" onclick="addMoney()">Напечатать монеты ➕</button>
            <br><br><hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
        </div>

        <h4 id="transfer-title">💸 Перевод на другой счет</h4>
        
        <button class="btn-alt" id="scan-btn" onclick="startScanner()">Сканировать QR-код получателя 📷</button>
        <div id="reader" style="display: none;"></div>
        
        <input type="text" id="target-account-number" placeholder="Номер счета получателя (XXXX XXXX)">
        <input type="number" id="transfer-amount" placeholder="Сумма перевода" min="1">
        <button class="btn-danger" id="transfer-btn" onclick="transferMoney()">Совершить перевод ➡️</button>
        
        <br><br>
        <button onclick="logout()" style="background-color: #95a5a6;">Выйти из кабинета 🔓</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
